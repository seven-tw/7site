<script>
function checkFBOrientation() {
    var overlay = document.getElementById('fbRotationOverlay');
    if (!overlay) return;


    var width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
    var height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
    
    var isPortrait = height > width;


    if (isPortrait) {
        overlay.style.display = 'flex';
    } else {
        overlay.style.display = 'none';
    }
}


window.addEventListener('resize', checkFBOrientation);
window.addEventListener('orientationchange', checkFBOrientation);
window.addEventListener('load', checkFBOrientation);


setInterval(checkFBOrientation, 300);


checkFBOrientation();
</script>

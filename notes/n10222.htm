            <td height="181" class="s1" colspan="2"><font color="#FFFFFF"><br>
              台北市東區是目前我工作的地點，每天過著上班下班的生活，忠孝東路上很多百貨服飾店，也有很多美式速食店，相當熱鬧。<br>
              這裡每天都有很多逛街的人潮在街上往來穿梭著，中午的午餐時間偶爾我也會出現在人群中，但是我卻是一個要去買便當的上班族。在馬路二旁的飲食店價格都不便宜，我通常只是在巷口裡跟固定的幾家路邊攤買便當吃。有時候，會在路上巧遇到電視裡的明星，看到本人和電視裡總有些不一樣，覺得蠻有趣的。<br>
              晚上，到東區玩的人更多，我反而是覺得上班好累，真想跟11號早點回家休息。</font></td>

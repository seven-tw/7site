            <td height="157" class="s2" colspan="2"><font color="#FFFFFF">今年的網路公司似乎都不好過...，一家接著一家裁員...，網路公司的頭銜不像前幾年那麼風光了。<br>
              有人問我網頁設計還可以做多久，我的想法是看自己還有多少熱忱...，這個行業不會因為網路公司的不景氣而消失，只是職場的流動量變大而已。<br>
              我並沒有把自己定位在網頁設計這條路，想接觸的東西實在太多，或許是因為網頁附有的多媒體性吸引了我，可以用Photoshop玩影像、用Flash玩動畫、軟體學不完等....<br>
              常常看到國內外那些嚇死人的酷站，心裡是又恨又愛，只有走入這一行，讓自己學習更多有趣的東西。 </font></td>

            <td height="157" class="s2" colspan="2"><font color="#FFFFFF">小時候常看些科幻漫畫或電影，常以21世紀為未來的舞台...，沒想到還真的來了....，未來的一百年裡，真不知道科技會發展到什麼地步?會被機器人統一嗎?還是會跟外星人打場星際大戰.....，或是地球人會移民火星?<br>

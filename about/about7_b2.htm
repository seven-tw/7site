      <p><font color="#FFFFFF" class="s1">　<font color="#CCCCCC">構思這個site其實有一段時間了，一直沒有時間來製作...在2000年的8月，總算把7號生出來了。</font></font></p>
      <p class="s1"><font color="#CCCCCC" class="s1">　目前的版本是靜態版的，有好的idea時再考慮做成flash動態版的，不過可能要粉久...呵呵</font></p>
      <p><font color="#CCCCCC" class="s1">　為什麼要叫「 7 號 」?</font></p>
      <p><font color="#CCCCCC" class="s1">　其實是我名字的諧音，也是机器人的名字(<font face="Arial, Helvetica, sans-serif">Miao</font>說是大頭

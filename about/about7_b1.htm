      <p><font color="#FFFFFF" class="s1">　<font color="#CCCCCC">學生時代唸的是商業設計，記得那時候還在拿針筆、鴨嘴筆、噴槍...塗塗畫畫，那時候是以「手工」作業的年代。 
        </font></font> </p>
      <p class="s1"><font color="#CCCCCC" class="s1">　現在「軟體」改變了作業方式，讓創意更快的表現，也更有效率，&quot;undo&quot;省掉了重畫的麻煩，還可以做出更多的嘗試。</font></p>
      <p><font color="#CCCCCC" class="s1">　數位創作延伸了視覺的可能性，從平面到3D CG，創作的成就感也更加豐富了。</font></p>

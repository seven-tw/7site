<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
    <title>||||||| Digital Diary |||||||</title>
    <style>
        body {
            background-color: #99CCFF;
            color: #666666;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 20px 10px;
        }
        a { color: #0099FF; text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        .responsive-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .calendar-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 15px;
        }
        .calen-main-table {
            border: 1px solid #99CCFF;
            background-color: white;
            border-collapse: collapse;
            margin: 0 auto;
        }
        .calen-main-table th {
            background-color: #F0F5FD;
            height: 35px;
            font-size: 16px;
        }
        .calen-main-table td {
            width: 45px; 
            height: 45px;
            text-align: center; 
            vertical-align: top;
            padding: 4px; 
            border: 1px solid #99CCFF;
            font-size: 12px;
        }
        
        .w-sun { color: #CC3366; font-weight: bold; }
        .w-sat { color: #6666FF; font-weight: bold; }
        .w-nor { color: #999999; }
        
        .cal-day-num {
            display: block;
            margin-bottom: 2px;
            font-weight: bold;
        }
        .cal-star-link {
            display: inline-block;
            color: #FF9900;
            font-size: 16px;
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
        }
        .cal-star-link:hover {
            transform: scale(1.3);
        }
        
        .s {
            font-size: 13px; color: #666666;
            border: 1px solid #999999; background-color: #ECF5FD;
            padding: 4px; border-radius: 3px;
        }
        /* 被禁用的月份樣式 */
        .s option:disabled {
            color: #BBBBBB;
            background-color: #EEEEEE;
        }

        .btn-submit {
            font-size: 13px; color: #666666;
            background-color: #DFEFFF; border: 1px solid #999999;
            padding: 4px 12px; cursor: pointer; border-radius: 3px;
            display: inline-block;
            font-weight: bold;
        }
        .btn-submit:hover {
            background-color: #99CCFF;
            color: white;
        }
        
        .content-box {
            background-color: white;
            width: 95%; max-width: 650px;
            margin: 15px auto; border: 1px solid #999999;
            border-radius: 4px; padding: 20px; text-align: left;
        }
        .sub-title { 
            color: #FF9900; 
            font-size: 18px; 
            font-weight: bold;
        }
        .diary-date-title {
            font-size: 14px;
            font-weight: bold;
        }
        hr { border: 0; height: 1px; background-color: powderblue; margin: 12px 0; }
        
        .diary-item {
            border-bottom: 1px dashed #CCCCCC;
            padding: 15px 0;
            scroll-margin-top: 20px;
        }
        .diary-item:last-child { border-bottom: none; }
        .diary-body {
            font-size: 15px; 
            line-height: 1.7; 
            color: #333333;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="responsive-container">
    <center>
        <font color="#CCCCCC" size="6"><b><span>||||||| Digital Diary |||||||</span></b></font>
        <p></p>

        <div class="calendar-scroll-wrapper">
            <table class="calen-main-table" id="calendar-table">
                </table>
        </div>

        <p></p>
        <table border="0" align="center">
            <tr>
                <td>
                    <select id="yearSelect" class="s" onchange="checkAvailableMonths()">
                        <option value="2000">2000 年</option>
                        <option value="2001">2001 年</option>
                        <option value="2002" selected>2002 年</option>
                    </select>
                    <select id="monthSelect" class="s">
                        <option value="01">1 月</option>
                        <option value="02">2 月</option>
                        <option value="03">3 月</option>
                        <option value="04" selected>4 月</option>
                        <option value="05">5 月</option>
                        <option value="06">6 月</option>
                        <option value="07">7 月</option>
                        <option value="08">8 月</option>
                        <option value="09">9 月</option>
                        <option value="10">10 月</option>
                        <option value="11">11 月</option>
                        <option value="12">12 月</option>
                    </select>
                    <button type="button" class="btn-submit" onclick="loadDiaryFile()">切換並讀取TXT</button>
                </td>
            </tr>
        </table>
        <br>

        <div class="content-box">
            <center><b id="display-date" style="font-size: 16px;">正在載入日記資料...</b></center>
            <hr>
            <div id="diary-content" style="min-height: 100px;">
                請點擊上方按鈕讀取 `.txt` 檔案。
            </div>
        </div>

    </center>
</div>

<script>
let activeDays = {};

// 🎯 修正：動態檢測當前年份有哪些月份的 TXT 檔存在，並隱藏沒有文章的月份
function checkAvailableMonths() {
    const year = document.getElementById('yearSelect').value;
    const monthSelect = document.getElementById('monthSelect');
    const options = monthSelect.options;

    // 巡迴 1~12 月，探測檔案是否存在
    for (let i = 0; i < options.length; i++) {
        const m = options[i].value;
        const fileUrl = `${year}${m}.txt`;

        // 使用 HEAD 請求快速偵測檔案，不占用過多流量
        fetch(fileUrl, { method: 'HEAD' })
            .then(res => {
                if (res.ok) {
                    options[i].disabled = false;
                    options[i].text = `${parseInt(m)} 月 (有文章)`;
                } else {
                    options[i].disabled = true;
                    options[i].text = `${parseInt(m)} 月 (無文章)`;
                    // 如果目前選中的月份剛好無文章，自動跳到第一個可選的月份
                    if (monthSelect.value === m) {
                        autoSelectFirstValid();
                    }
                }
            })
            .catch(() => {
                options[i].disabled = true;
                options[i].text = `${parseInt(m)} 月 (無文章)`;
            });
    }
}

function autoSelectFirstValid() {
    const monthSelect = document.getElementById('monthSelect');
    for (let option of monthSelect.options) {
        if (!option.disabled) {
            monthSelect.value = option.value;
            break;
        }
    }
}

// 🎯 修正：精準計算週數，移除月曆底部多出來的空白行
function generateCalendarSkeleton() {
    const year = parseInt(document.getElementById('yearSelect').value);
    const month = parseInt(document.getElementById('monthSelect').value);
    
    const table = document.getElementById('calendar-table');
    table.innerHTML = ""; 

    let html = `<tr><th colspan="7">${year}年 ${month}月</th></tr>`;
    html += `
        <tr>
            <td class="w-sun">SUN</td><td class="w-nor">MON</td><td class="w-nor">TUE</td>
            <td class="w-nor">WED</td><td class="w-nor">THU</td><td class="w-nor">FRI</td><td class="w-sat">SAT</td>
        </tr>
    `;

    const firstDayIndex = new Date(year, month - 1, 1).getDay();
    const totalDays = new Date(year, month, 0).getDate();

    // 🎯 修正核心：動態計算這個月到底需要 4 行、5 行還是 6 行
    const totalCellsNeeded = firstDayIndex + totalDays;
    const rowsNeeded = Math.ceil(totalCellsNeeded / 7);

    let dayCounter = 1;
    for (let i = 0; i < rowsNeeded; i++) {
        html += "<tr>";
        for (let j = 0; j < 7; j++) {
            let cellClass = "w-nor";
            if (j === 0) cellClass = "w-sun";
            if (j === 6) cellClass = "w-sat";

            const cellIndex = i * 7 + j;
            if (cellIndex >= firstDayIndex && dayCounter <= totalDays) {
                html += `<td class="${cellClass}" id="cal-day-${dayCounter}">
                            <span class="cal-day-num">${dayCounter}</span>
                            <span class="star-container"></span>
                         </td>`;
                dayCounter++;
            } else {
                html += `<td style="color:#DDDDDD;">-</td>`;
            }
        }
        html += "</tr>";
    }
    table.innerHTML = html;
}

function loadDiaryFile() {
    generateCalendarSkeleton(); 
    
    const year = document.getElementById('yearSelect').value;
    const month = document.getElementById('monthSelect').value;
    const fileName = `${year}${month}.txt`;

    document.getElementById('display-date').innerText = `${year}年 ${parseInt(month)}月 的所有記事`;
    const contentDiv = document.getElementById('diary-content');
    contentDiv.innerHTML = `正在嘗試讀取 ${fileName} ...`;

    fetch(fileName)
        .then(response => {
            if (!response.ok) {
                throw new Error(`找不到檔案：${fileName}<br>請確認該文字檔有與此 htm 放在同一個目錄。`);
            }
            return response.arrayBuffer();
        })
        .then(buffer => {
            const decoder = new TextDecoder('big5'); 
            const text = decoder.decode(buffer);
            
            const lines = text.split('\n');
            let htmlOutput = "";
            activeDays = {}; 

            lines.forEach(line => {
                if(line.trim() === "") return;
                const parts = line.split('<>');
                if(parts.length >= 3 && parts[1] !== "") {
                    const day = parseInt(parts[0]);
                    const subject = parts[1];
                    let message = parts[2];

                    message = message.replace(/&lt;/g, '<').replace(/&gt;/g, '>'); 

                    // 破圖防護
                    message = message.replace(/<img\s([^>]*?)\/?>/gi, (match) => {
                        if (!match.includes('onerror')) {
                            return match.replace('<img', '<img onerror="this.style.display=\'none\';" style="max-width:100%; height:auto; display:block; margin:10px 0;"');
                        }
                        return match;
                    });

                    activeDays[day] = true;

                    htmlOutput += `
                        <div class="diary-item" id="post-${day}">
                            <span class="sub-title">${subject}</span> 
                            <span class="diary-date-title">/ ${year}年${parseInt(month)}月${day}日</span>
                            <div class="diary-body">${message}</div>
                        </div>
                    `;
                }
            });

            if(htmlOutput === "") {
                contentDiv.innerHTML = "該月份檔案中沒有找到有效的日記資料。";
            } else {
                contentDiv.innerHTML = htmlOutput;
                for (let day in activeDays) {
                    const dayCell = document.getElementById(`cal-day-${day}`);
                    if (dayCell) {
                        const starContainer = dayCell.querySelector('.star-container');
                        if (starContainer) {
                            starContainer.innerHTML = `<br><a class="cal-star-link" href="#post-${day}" title="點擊閱讀這篇日記">★</a>`;
                        }
                    }
                }
            }
        })
        .catch(error => {
            contentDiv.innerHTML = `<span style="color:red;">${error.message}</span>`;
        });
}

// 首次載入先執行月份探測與讀取
window.onload = function() {
    checkAvailableMonths();
    loadDiaryFile();
};
</script>

</body>
</html>

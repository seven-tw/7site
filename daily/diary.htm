<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
    <title>||||||| Digital Diary |||||||</title>
    <style>
        body {
            background-color: #99CCFF;
            color: #666666;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12px;
            margin: 0;
            padding: 20px 10px;
        }
        a { color: #0099FF; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .responsive-container {
            max-width: 800px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .calendar-scroll-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 15px;
        }
        .calen-main-table {
            border: 1px solid #99CCFF;
            background-color: white;
            border-collapse: collapse;
            margin: 0 auto;
        }
        .calen-main-table th {
            background-color: #F0F5FD;
            height: 30px;
            font-size: 14px;
        }
        .calen-main-table td {
            width: 40px; height: 40px;
            text-align: center; vertical-align: top;
            padding: 4px; border: 1px solid #99CCFF;
        }
        .w-sun { color: #CC3366; font-weight: bold; }
        .w-sat { color: #6666FF; font-weight: bold; }
        .w-nor { color: #999999; }
        
        .diary-star {
            display: inline-block;
            color: #FF9900;
            font-size: 14px;
            margin-top: 2px;
        }
        .s {
            font-size: 12px; color: #666666;
            border: 1px solid #999999; background-color: #ECF5FD;
            padding: 3px; border-radius: 3px;
        }
        .btn-submit {
            font-size: 12px; color: #666666;
            background-color: #DFEFFF; border: 1px solid #999999;
            padding: 4px 10px; cursor: pointer; border-radius: 3px;
            display: inline-block;
        }
        .btn-submit:hover {
            background-color: #99CCFF;
            color: white;
        }
        .btn-nav {
            font-size: 11px;
            font-weight: bold;
            color: #555555;
            background-color: #FFFFFF;
            border: 1px solid #99CCFF;
            padding: 3px 8px;
            margin: 0 5px;
            border-radius: 3px;
        }
        .btn-nav:hover {
            background-color: #F0F5FD;
            text-decoration: none;
        }
        .content-box {
            background-color: white;
            width: 95%; max-width: 600px;
            margin: 15px auto; border: 1px solid #999999;
            border-radius: 4px; padding: 15px; text-align: left;
        }
        .sub-title { color: #FF9900; font-size: 14px; }
        hr { border: 0; height: 1px; background-color: powderblue; margin: 10px 0; }
        
        .diary-item {
            border-bottom: 1px dashed #CCCCCC;
            padding: 10px 0;
        }
        .diary-item:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="responsive-container">
    <center>
        <font color="#666666" size="6"><b><span>||||||| Digital Diary |||||||</span></b></font>
        <p></p>

        <!-- 月曆區 -->
        <div class="calendar-scroll-wrapper">
            <table class="calen-main-table">
                <tr><th colspan="7" id="calendar-title">2002年 4月</th></tr>
                <tr>
                    <td class="w-sun">SUN</td><td class="w-nor">MON</td><td class="w-nor">TUE</td>
                    <td class="w-nor">WED</td><td class="w-nor">THU</td><td class="w-nor">FRI</td><td class="w-sat">SAT</td>
                </tr>
                <tr>
                    <td>-</td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td>
                </tr>
            </table>
        </div>

        <a href="#" class="btn-nav">◀ BACK</a>
        <a href="#" class="btn-nav">NEXT ▶</a>

        <!-- 檔案讀取控制區 -->
        <p></p>
        <table border="0" align="center">
            <tr>
                <td>
                    <!-- 🎯 已修正：年份選單僅保留 2000, 2001, 2002，並預設為 2002 -->
                    <select id="yearSelect" class="s">
                        <option value="2000">2000 年</option>
                        <option value="2001">2001 年</option>
                        <option value="2002" selected>2002 年</option>
                    </select>
                    <select id="monthSelect" class="s">
                        <option value="01">1 月</option>
                        <option value="02">2 月</option>
                        <option value="03">3 月</option>
                        <option value="04" selected>4 月</option>
                        <option value="05">5 月</option>
                        <option value="06">6 月</option>
                        <option value="07">7 月</option>
                        <option value="08">8 月</option>
                        <option value="09">9 月</option>
                        <option value="10">10 月</option>
                        <option value="11">11 月</option>
                        <option value="12">12 月</option>
                    </select>
                    <button type="button" class="btn-submit" onclick="loadDiaryFile()">切換並讀取TXT</button>
                </td>
            </tr>
        </table>
        <br>

        <!-- 日記顯示區 -->
        <div class="content-box">
            <center><b id="display-date">正在載入日記資料...</b></center>
            <hr>
            <div id="diary-content" style="padding:10px; line-height:1.6;">
                請點擊上方按鈕讀取 `.txt` 檔案。
            </div>
        </div>

    </center>
</div>

<script>
function loadDiaryFile() {
    const year = document.getElementById('yearSelect').value;
    const month = document.getElementById('monthSelect').value;
    const fileName = `${year}${month}.txt`;

    document.getElementById('calendar-title').innerText = `${year}年 ${parseInt(month)}月`;
    document.getElementById('display-date').innerText = `${year}年 ${parseInt(month)}月 的所有記事`;
    
    const contentDiv = document.getElementById('diary-content');
    contentDiv.innerHTML = `正在嘗試讀取 ${fileName} ...`;

    fetch(fileName)
        .then(response => {
            if (!response.ok) {
                throw new Error(`找不到檔案：${fileName}<br>請確認該文字檔有跟這個 htm 放在同一個資料夾。`);
            }
            return response.arrayBuffer();
        })
        .then(buffer => {
            const decoder = new TextDecoder('big5'); 
            const text = decoder.decode(buffer);
            
            const lines = text.split('\n');
            let htmlOutput = "";

            lines.forEach(line => {
                if(line.trim() === "") return;
                const parts = line.split('<>');
                if(parts.length >= 3 && parts[1] !== "") {
                    const day = parts[0];
                    const subject = parts[1];
                    let message = parts[2];

                    message = message.replace(/&lt;/g, '<').replace(/&gt;/g, '>'); 

                    // 🎯 包含上一版加入的「破圖自動隱藏」防護機制
                    message = message.replace(/<img\s([^>]*?)\/?>/gi, (match) => {
                        if (!match.includes('onerror')) {
                            return match.replace('<img', '<img onerror="this.style.display=\'none\';" style="max-width:100%; height:auto; display:block; margin:10px 0;"');
                        }
                        return match;
                    });

                    htmlOutput += `
                        <div class="diary-item">
                            <span style="color: #FF9900; font-weight: bold;">
                                [${parseInt(month)}/${parseInt(day)}] ${subject} <span class="diary-star">★</span>
                            </span>
                            <div style="margin-top: 5px; color: #333333;">${message}</div>
                        </div>
                    `;
                }
            });

            if(htmlOutput === "") {
                contentDiv.innerHTML = "該月份檔案中沒有找到有效的日記資料（或格式不符）。";
            } else {
                contentDiv.innerHTML = htmlOutput;
            }
        })
        .catch(error => {
            contentDiv.innerHTML = `<span style="color:red;">${error.message}</span>`;
        });
}

window.onload = loadDiaryFile;
</script>

</body>
</html>
